<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen p-4 md:p-6">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-2xl shadow-2xl">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 border-b pb-4 gap-4">
            <h1 class="text-xl font-bold text-blue-800">STORE DASHBOARD</h1>
            <div id="navButtons" class="flex gap-2 flex-wrap justify-center">
                <button id="adminSetBtn" onclick="showSection('settings')" class="hidden bg-slate-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-slate-700">Admin Settings</button>
                <button id="supplierBtn" onclick="showSection('supplier')" class="hidden bg-amber-600 text-white px-3 py-2 rounded-lg text-sm font-bold">Supplier</button>
                <button id="reportBtn" onclick="showSection('reports')" class="hidden bg-purple-600 text-white px-3 py-2 rounded-lg text-sm font-bold">စာရင်းဇယား</button>
                <button id="adminBtn" onclick="document.getElementById('loginModal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700">Admin Login</button>
                <button id="logoutBtn" onclick="location.reload()" class="hidden bg-red-500 text-white px-4 py-2 rounded-lg font-semibold">Logout</button>
            </div>
        </header>

        <!-- User View -->
        <div id="userView" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-emerald-100 p-4 rounded-xl border">
                    <h2 class="font-bold text-emerald-800 mb-2">ပစ္စည်းစာရင်းသွင်းရန်</h2>
                    <input type="text" id="itemName" placeholder="ပစ္စည်းအမည်" class="w-full p-2 mb-1 border rounded">
                    <input type="number" id="itemQty" placeholder="အရေအတွက်" class="w-full p-2 mb-1 border rounded">
                    <input type="number" id="buyPrice" placeholder="ဝယ်ဈေး" class="w-full p-2 mb-2 border rounded">
                    <button onclick="addInventory()" class="w-full bg-emerald-600 text-white py-2 rounded-lg">သိမ်းမည်</button>
                    <p id="msgInv" class="text-emerald-700 text-center mt-2 font-bold hidden">သိမ်းပြီးပါပြီ</p>
                </div>
                <div class="bg-sky-100 p-4 rounded-xl border">
                    <h2 class="font-bold text-sky-800 mb-2">အရောင်းမှတ်တမ်း</h2>
                    <select id="saleItemSelect" class="w-full p-2 mb-1 border rounded"><option>ပစ္စည်းရွေးပါ</option></select>
                    <input type="number" id="saleQty" placeholder="အရေအတွက်" class="w-full p-2 mb-1 border rounded">
                    <input type="number" id="sellPrice" placeholder="ရောင်းဈေး" class="w-full p-2 mb-2 border rounded">
                    <button onclick="processSale()" class="w-full bg-sky-600 text-white py-2 rounded-lg">ရောင်းမည်</button>
                    <p id="msgSale" class="text-sky-700 text-center mt-2 font-bold hidden">ရောင်းပြီးပါပြီ</p>
                </div>
            </div>
            <div id="invList" class="bg-white p-4 rounded-xl border shadow-sm"></div>
        </div>

        <!-- Admin Sections -->
        <div id="supplier" class="hidden space-y-2 bg-amber-50 p-4 rounded-xl border">
            <h2 class="font-bold text-amber-900 mb-2">Supplier စီမံခန့်ခွဲမှု</h2>
            <input type="text" id="supName" placeholder="ဆက်သွယ်ရမည့်သူ" class="w-full p-2 border rounded">
            <input type="text" id="supShop" placeholder="ဆိုင်နာမည်" class="w-full p-2 border rounded">
            <input type="text" id="supPhone" placeholder="ဖုန်းနံပါတ်" class="w-full p-2 border rounded">
            <input type="text" id="supFB" placeholder="Facebook Link" class="w-full p-2 border rounded">
            <button onclick="addSupplier()" class="w-full bg-amber-600 text-white py-2 rounded-lg">Supplier မှတ်တမ်းတင်</button>
            <p id="msgSup" class="text-amber-700 text-center mt-2 font-bold hidden">မှတ်တမ်းတင်ပြီးပါပြီ</p>
            <div id="supList" class="mt-4 text-sm overflow-x-auto"></div>
        </div>

        <div id="reports" class="hidden bg-purple-50 p-4 rounded-xl border">
            <h2 class="font-bold mb-2">စာရင်းဇယား</h2>
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button onclick="filterReport('day')" class="bg-purple-700 text-white px-3 py-1 rounded text-xs">နေ့စဉ်</button>
                <button onclick="filterReport('week')" class="bg-purple-700 text-white px-3 py-1 rounded text-xs">တစ်ပတ်</button>
                <button onclick="filterReport('month')" class="bg-purple-700 text-white px-3 py-1 rounded text-xs">တစ်လ</button>
            </div>
            <div id="statsDisplay" class="overflow-x-auto text-xs"></div>
        </div>
        
        <div id="settings" class="hidden bg-gray-200 p-4 rounded-xl border">
            <h2 class="font-bold mb-2">Admin အကောင့် ပြောင်းလဲရန်</h2>
            <input type="text" id="newAdminId" placeholder="New ID" class="w-full p-2 mb-1 border rounded">
            <div class="relative mb-2">
                <input type="password" id="newAdminPass" placeholder="New Password" class="w-full p-2 border rounded pr-10">
                <button onclick="togglePass('newAdminPass')" class="absolute right-2 top-2 text-sm text-gray-500">👁️</button>
            </div>
            <button onclick="updateAdmin()" class="bg-red-600 text-white w-full py-2 rounded-lg">Admin ပြောင်းမည်</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="font-bold mb-4 text-center">Admin Login</h2>
            <input type="text" id="adminId" placeholder="Admin ID" class="w-full p-2 mb-2 border rounded">
            <div class="relative mb-4">
                <input type="password" id="adminPass" placeholder="Admin Password" class="w-full p-2 border rounded pr-10">
                <button onclick="togglePass('adminPass')" class="absolute right-2 top-2 text-sm text-gray-500">👁️</button>
            </div>
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Login</button>
            <button onclick="document.getElementById('loginModal').classList.add('hidden')" class="w-full mt-2 text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBD7oF2HowywzHv9sNumw9CFBqqThYzJI", authDomain: "store-sale-record-app.firebaseapp.com", projectId: "store-sale-record-app", storageBucket: "store-sale-record-app.appspot.com", messagingSenderId: "435017633854", appId: "1:435017633854:web:e39c5e6a29ee98dc32416f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let adminId = "admin", adminPass = "ssr123";

        function togglePass(id) {
            const x = document.getElementById(id);
            x.type = (x.type === "password") ? "text" : "password";
        }

        function showStatus(id) {
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 2000);
        }

        window.onload = function() {
            db.collection("inventory").onSnapshot(snapshot => {
                let html = "<table class='w-full text-left border'><tr><th>ပစ္စည်း</th><th>Qty</th><th>ဝယ်ဈေး</th></tr>";
                let select = document.getElementById('saleItemSelect');
                select.innerHTML = '<option>ပစ္စည်းရွေးပါ</option>';
                snapshot.forEach(doc => {
                    let d = doc.data();
                    html += `<tr><td>${d.name}</td><td>${d.qty}</td><td>${d.buy}</td></tr>`;
                    select.innerHTML += `<option value="${d.name}" data-buy="${d.buy}">${d.name}</option>`;
                });
                document.getElementById('invList').innerHTML = html + "</table>";
            });

            db.collection("suppliers").onSnapshot(snapshot => {
                let html = "<table class='w-full border text-xs'><tr><th>အမည်</th><th>ဆိုင်</th><th>ဖုန်း</th><th>FB</th></tr>";
                snapshot.forEach(doc => {
                    let d = doc.data();
                    html += `<tr><td>${d.name}</td><td>${d.shop}</td><td>${d.phone}</td><td><a href='${d.fb}' target='_blank' class='text-blue-500'>Link</a></td></tr>`;
                });
                document.getElementById('supList').innerHTML = html + "</table>";
            });
        };

        function addInventory() { 
            db.collection("inventory").add({ name: document.getElementById('itemName').value, qty: document.getElementById('itemQty').value, buy: document.getElementById('buyPrice').value }).then(() => showStatus('msgInv')); 
        }
        
        function processSale() { 
            const select = document.getElementById('saleItemSelect');
            const buyPrice = select.options[select.selectedIndex].getAttribute('data-buy') || 0;
            db.collection("sales").add({ 
                item: select.value, 
                qty: document.getElementById('saleQty').value, 
                sellPrice: document.getElementById('sellPrice').value,
                buyPrice: buyPrice,
                timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            }).then(() => showStatus('msgSale')); 
        }

        function addSupplier() { 
            db.collection("suppliers").add({ 
                name: document.getElementById('supName').value, 
                shop: document.getElementById('supShop').value, 
                phone: document.getElementById('supPhone').value,
                fb: document.getElementById('supFB').value 
            }).then(() => showStatus('msgSup')); 
        }

        function filterReport(period) {
            db.collection("sales").get().then(snapshot => {
                let html = "<table class='w-full border text-left'><tr><th>No</th><th>ပစ္စည်း</th><th>Qty</th><th>အမြတ်</th></tr>";
                let now = new Date();
                let count = 1;
                snapshot.forEach(doc => {
                    let d = doc.data();
                    let saleDate = (d.timestamp && typeof d.timestamp.toDate === 'function') ? d.timestamp.toDate() : new Date();
                    let diffTime = Math.abs(now - saleDate);
                    let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    
                    let show = false;
                    if(period === 'day' && diffDays <= 1) show = true;
                    else if(period === 'week' && diffDays <= 7) show = true;
                    else if(period === 'month' && diffDays <= 30) show = true;

                    if(show) {
                        let profit = (parseFloat(d.sellPrice || 0) - parseFloat(d.buyPrice || 0)) * parseFloat(d.qty || 0);
                        html += `<tr><td>${count++}</td><td>${d.item}</td><td>${d.qty}</td><td>${profit.toLocaleString()}</td></tr>`;
                    }
                });
                document.getElementById('statsDisplay').innerHTML = html + "</table>";
            });
        }

        function checkLogin() { 
            if(document.getElementById('adminId').value === adminId && document.getElementById('adminPass').value === adminPass) { 
                document.getElementById('loginModal').classList.add('hidden'); 
                document.getElementById('adminBtn').classList.add('hidden'); 
                document.getElementById('adminSetBtn').classList.remove('hidden');
                document.getElementById('supplierBtn').classList.remove('hidden');
                document.getElementById('reportBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden'); 
            } else { alert("ID သို့မဟုတ် Password မှားနေသည်"); } 
        }
        
        function updateAdmin() { adminId = document.getElementById('newAdminId').value; adminPass = document.getElementById('newAdminPass').value; alert("ပြောင်းလဲပြီးပါပြီ"); }
        
        function showSection(id) { 
            ['supplier', 'reports', 'settings', 'userView'].forEach(s => document.getElementById(s).classList.add('hidden')); 
            document.getElementById(id).classList.remove('hidden'); 
        }
    </script>
</body>
</html>
